services:
  postgres:
    image: postgres:15-alpine
    container_name: fleet-postgres
    environment:
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_pass
      POSTGRES_DB: fleet_docs
    ports:
      - "5433:5432"
    volumes:
      - fleet_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user -d fleet_docs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fleet_pg_data:
